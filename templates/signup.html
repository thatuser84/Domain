{% extends "base.html" %}
{% block title %}afterhours — sign up{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="page-header">
      <h1>sign up</h1>
    </div>

    {% if error %}
      <div class="banner banner-warn">{{ error }}</div>
    {% endif %}
    {% if notice %}
      <div class="banner banner-ok">{{ notice }}</div>
    {% endif %}

    <form method="post" class="form">
      <label for="email">email</label>
      <input type="email" id="email" name="email" value="{{ email or '' }}" required autofocus>

      <label for="password">password</label>
      <input type="password" id="password" name="password" required minlength="8">
      <p class="hint">at least 8 characters.</p>

      <label for="confirm_password">confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="8">

      <button type="submit" class="btn btn-primary btn-block">create account</button>
    </form>
    <p class="hint" style="margin-top:18px">already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent-bright)">log in</a></p>
  </div>
</div>
{% endblock %}
